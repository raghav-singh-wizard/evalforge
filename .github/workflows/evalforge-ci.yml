name: EvalForge CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: |
          python -m ruff check evalforge tests
        continue-on-error: false

      - name: Test
        run: |
          python -m pytest --cov=evalforge --cov-report=xml -v

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  regression-gate:
    name: Regression Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need history for baseline

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Fetch baseline from main
        run: |
          mkdir -p benchmarks/results
          git show origin/main:benchmarks/results/baseline.json > benchmarks/results/baseline.json 2>/dev/null || echo "No baseline on main — first-run skip."

      - name: Run eval (current PR)
        run: |
          make eval

      - name: Run regression gate
        if: ${{ hashFiles('benchmarks/results/baseline.json') != '' }}
        run: |
          python -m evalforge.regression_gate \
            --baseline benchmarks/results/baseline.json \
            --current  benchmarks/results/current.json \
            --threshold 0.03 \
            --output gate_report.txt

      - name: Comment PR with regression report
        if: ${{ always() && hashFiles('gate_report.txt') != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('gate_report.txt', 'utf8');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '### EvalForge Regression Gate\n```\n' + report + '\n```'
            });
